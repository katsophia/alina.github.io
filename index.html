<head>
    <meta charset="UTF-8" />

    <title>ALINA Official Website</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <style>
        :root {
            --speed: 0.4s;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; 
        }

        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('brown-paper.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .corner {
            position: absolute;
            width: 35%; 
            height: 35%;
            transition: transform var(--speed) ease-out;
            cursor: pointer;
            z-index: 5;
        }

        .top-left     { top: 0; left: 0; transform-origin: top left; }
        .top-right    { top: 0; right: 0; transform-origin: top right; }
        .bottom-left  { bottom: 0; left: 0; transform-origin: bottom left; }
        .bottom-right { bottom: 0; right: 0; transform-origin: bottom right; }

        .corner:hover { transform: scale(1.05); }

        .paper-img {
            width: 100%;
            height: 100%;
            object-fit: fill; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .eye-container {
            position: relative;
            z-index: 10;
            width: 60vw; 
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto; 
            transform: translateY(30px); 
        }

        .eye-center {
            position: absolute;
            width: 100%;
            height: auto;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }

        .eye-blinking { opacity: 0; }
        .eye-container:hover .eye-resting { opacity: 0; }
        .eye-container:hover .eye-blinking { opacity: 1; }

        /* SOCIAL ICONS CONTAINER */
        .social-footer {
            position: absolute;
            bottom: 40px; /* Slightly higher for larger icons */
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 35px; /* Increased gap for larger icons */
            align-items: center;
        }

        .social-footer a {
            color: #fff;
            text-decoration: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-footer a:hover {
            transform: scale(1.15);
            opacity: 0.8;
        }

        /* ICON SIZE - Increased to 40px */
        .social-footer svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }
    </style>
</head>
