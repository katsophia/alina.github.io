<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alina Site Template</title>
    <style>
        :root {
            --speed: 0.4s;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; 
        }

        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('brown-paper.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .corner {
            position: absolute;
            width: 50%; /* Changed to 50% to ensure they can touch the center if needed */
            height: 50%;
            transition: transform var(--speed) ease-out;
            cursor: pointer;
            z-index: 5;
        }

        /* POSITIONING: Forced to 0 to remove any gap */
        .top-left     { top: 0; left: 0; transform-origin: top left; }
        .top-right    { top: 0; right: 0; transform-origin: top right; }
        .bottom-left  { bottom: 0; left: 0; transform-origin: bottom left; }
        .bottom-right { bottom: 0; right: 0; transform-origin: bottom right; }

        /* POP-OUT ANIMATION: Simplified so it doesn't "pull away" from the wall */
        .top-left:hover     { transform: scale(1.05); }
        .top-right:hover    { transform: scale(1.05); }
        .bottom-left:hover  { transform: scale(1.05); }
        .bottom-right:hover { transform: scale(1.05); }

        .paper-img {
            width: 100%;
            height: 100%;
            /* 'fill' ensures the image edges touch the div edges */
            object-fit: fill; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .text-overlay {
            position: absolute;
            z-index: 2;
            width: 40%; /* Sized down slightly for better fit */
            pointer-events: none;
        }

        /* Adjusted text positioning to look better in the absolute corners */
        .top-left .text-overlay     { bottom: 20%; right: 20%; }
        .top-right .text-overlay    { bottom: 20%; left: 20%; }
        .bottom-left .text-overlay  { top: 20%; right: 20%; }
        .bottom-right .text-overlay { top: 20%; left: 20%; }

        /* CENTER EYE */
        .eye-container {
            position: relative;
            z-index: 10;
            width: 40vw; /* Sized down slightly so corners have room */
            height: 40vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .eye-center {
            position: absolute;
            width: 100%;
            height: auto;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }

        .eye-blinking { opacity: 0; }
        .eye-container:hover .eye-resting { opacity: 0; }
        .eye-container:hover .eye-blinking { opacity: 1; }
    </style>
</head>
<body>

    <div class="stage">
        <div class="corner top-left">
            <img src="orange-paper.png" class="paper-img" alt="Paper Background">
            <img src="music-text.png" class="text-overlay" alt="Music Label">
        </div>

        <div class="corner top-right">
            <img src="blue-paper.png" class="paper-img" alt="Paper Background">
            <img src="merch-text.png" class="text-overlay" alt="Merch Label">
        </div>

        <div class="corner bottom-left">
            <img src="green-paper.png" class="paper-img" alt="Paper Background">
            <img src="tour-text.png" class="text-overlay" alt="Tour Label">
        </div>

        <div class="corner bottom-right">
            <img src="purple-paper.png" class="paper-img" alt="Paper Background">
            <img src="gallery-text.png" class="text-overlay" alt="Gallery Label">
        </div>

        <div class="eye-container">
            <img src="eye-resting.png" class="eye-center eye-resting" alt="Alina Eye">
            <img src="eye-blinking.png" class="eye-center eye-blinking" alt="Alina Eye">
        </div>
    </div>

</body>
</html>
