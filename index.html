<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alina Site Template</title>
    <style>
        :root {
            --speed: 0.4s;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Backup color if image fails */
        }

        /* THE MAIN BACKGROUND IMAGE SECTION */
        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            
            /* This is where your brown paper image goes */
            background-image: url('brown-paper.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The container for each corner piece */
        .corner {
            position: absolute;
            width: 45%; 
            height: 45%;
            transition: transform var(--speed) ease-out;
            cursor: pointer;
            z-index: 5;
        }

        /* POSITIONING THE CORNERS */
        .top-left     { top: 0; left: 0; }
        .top-right    { top: 0; right: 0; }
        .bottom-left  { bottom: 0; left: 0; }
        .bottom-right { bottom: 0; right: 0; }

        /* THE POP-OUT ANIMATION */
        .top-left:hover     { transform: scale(1.05) translate(10px, 10px); }
        .top-right:hover    { transform: scale(1.05) translate(-10px, 10px); }
        .bottom-left:hover  { transform: scale(1.05) translate(10px, -10px); }
        .bottom-right:hover { transform: scale(1.05) translate(-10px, -10px); }

        /* THE IMAGE HOLDERS (The 4 colored papers) */
        .paper-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* THE TEXT/HANDWRITING OVERLAY */
        .text-overlay {
            position: absolute;
            z-index: 2;
            width: 50%; 
            pointer-events: none;
        }

        /* Positioning the handwriting on the paper */
        .top-left .text-overlay     { bottom: 15%; right: 15%; }
        .top-right .text-overlay    { bottom: 15%; left: 15%; }
        .bottom-left .text-overlay  { top: 15%; right: 15%; }
        .bottom-right .text-overlay { top: 15%; left: 15%; }

        /* THE CENTRAL EYE ART */
        .eye-center {
            position: relative;
            z-index: 10;
            width: 50vw;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="stage">
        
        <div class="corner top-left">
            <img src="orange-paper.png" class="paper-img" alt="Paper Background">
            <img src="music-text.png" class="text-overlay" alt="Music Label">
        </div>

        <div class="corner top-right">
            <img src="blue-paper.png" class="paper-img" alt="Paper Background">
            <img src="merch-text.png" class="text-overlay" alt="Merch Label">
        </div>

        <div class="corner bottom-left">
            <img src="green-paper.png" class="paper-img" alt="Paper Background">
            <img src="tour-text.png" class="text-overlay" alt="Tour Label">
        </div>

        <div class="corner bottom-right">
            <img src="purple-paper.png" class="paper-img" alt="Paper Background">
            <img src="gallery-text.png" class="text-overlay" alt="Gallery Label">
        </div>

        <img src="eye-artwork.png" class="eye-center" alt="Alina Eye">

    </div>

</body>
</html>
