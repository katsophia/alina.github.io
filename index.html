<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALINA Official Website</title>
    <style>
        :root {
            --speed: 0.4s;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; 
        }

        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('brown-paper.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .corner {
            position: absolute;
            width: 35%; 
            height: 35%;
            transition: transform var(--speed) ease-out;
            cursor: pointer;
            z-index: 5;
        }

        /* POSITIONING */
        .top-left     { top: 0; left: 0; transform-origin: top left; }
        .top-right    { top: 0; right: 0; transform-origin: top right; }
        .bottom-left  { bottom: 0; left: 0; transform-origin: bottom left; }
        .bottom-right { bottom: 0; right: 0; transform-origin: bottom right; }

        .corner:hover { transform: scale(1.05); }

        .paper-img {
            width: 100%;
            height: 100%;
            object-fit: fill; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* LABEL FOR GALLERY CORNER */
        .corner-label {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 45%;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.5rem;
            color: rgba(0,0,0,0.5);
            z-index: 2;
            pointer-events: none;
            letter-spacing: 2px;
        }

        /* GALLERY OVERLAY */
        #gallery-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 40px;
        }

        /* POLAROID STYLE */
        .polaroid {
            background: #fff;
            padding: 10px 10px 35px 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            margin: 15px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .polaroid img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .polaroid:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 110;
        }

        #close-x {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            font-family: sans-serif;
            z-index: 120;
        }

        /* CENTER EYE */
        .eye-container {
            position: relative;
            z-index: 10;
            width: 60vw; 
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto; 
            transform: translateY(30px); 
        }

        .eye-center {
            position: absolute;
            width: 100%;
            height: auto;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }

        .eye-blinking { opacity: 0; }
        .eye-container:hover .eye-resting { opacity: 0; }
        .eye-container:hover .eye-blinking { opacity: 1; }
    </style>
</head>
<body>

    <div class="stage">
        <div class="corner top-left">
            <img src="orange-paper.png" class="paper-img" alt="Orange Paper">
        </div>

        <div class="corner top-right" onclick="openGallery()">
            <div class="corner-label">GALLERY</div>
            <img src="blue-paper.png" class="paper-img" alt="Blue Paper">
        </div>

        <div class="corner bottom-left">
            <img src="green-paper.png" class="paper-img" alt="Green Paper">
        </div>

        <div class="corner bottom-right">
            <img src="purple-paper.png" class="paper-img" alt="Purple Paper">
        </div>

        <div class="eye-container">
            <img src="eye-resting.png" class="eye-center eye-resting" alt="Alina Eye">
            <img src="eye-blinking.png" class="eye-center eye-blinking" alt="Alina Eye Blinking">
        </div>
    </div>

    <div id="gallery-overlay">
        <span id="close-x" onclick="closeGallery()">&times;</span>
        
        <div class="polaroid" style="transform: rotate(-6deg);"><img src="gallery-1.jpg" alt="Gallery 1"></div>
        <div class="polaroid" style="transform: rotate(4deg);"><img src="gallery-2.jpg" alt="Gallery 2"></div>
        <div class="polaroid" style="transform: rotate(-2deg);"><img src="gallery-3.jpg" alt="Gallery 3"></div>
        <div class="polaroid" style="transform: rotate(7deg);"><img src="gallery-4.jpg" alt="Gallery 4"></div>
    </div>

    <script>
        const overlay = document.getElementById('gallery-overlay');

        function openGallery() {
            overlay.style.display = 'flex';
        }

        function closeGallery() {
            overlay.style.display = 'none';
        }

        // Close when clicking the dark background
        window.onclick = function(event) {
            if (event.target == overlay) {
                closeGallery();
            }
        }
    </script>

</body>
</html>
