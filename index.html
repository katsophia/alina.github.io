<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alina Site Template</title>
    <style>
        :root {
            --speed: 0.4s;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; 
        }

        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('brown-paper.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .corner {
            position: absolute;
            /* Smaller corners */
            width: 35%; 
            height: 35%;
            transition: transform var(--speed) ease-out;
            cursor: pointer;
            z-index: 5;
        }

        /* POSITIONING */
        .top-left     { top: 0; left: 0; transform-origin: top left; }
        .top-right    { top: 0; right: 0; transform-origin: top right; }
        .bottom-left  { bottom: 0; left: 0; transform-origin: bottom left; }
        .bottom-right { bottom: 0; right: 0; transform-origin: bottom right; }

        .corner:hover { transform: scale(1.05); }

        .paper-img {
            width: 100%;
            height: 100%;
            object-fit: fill; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* CENTER EYE - BIGGER */
        .eye-container {
            position: relative;
            z-index: 10;
            width: 60vw; 
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto; 
            /* This line moves the eye slightly lower */
            transform: translateY(30px); 
        }

        .eye-center {
            position: absolute;
            width: 100%;
            height: auto;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }

        .eye-blinking { opacity: 0; }
        .eye-container:hover .eye-resting { opacity: 0; }
        .eye-container:hover .eye-blinking { opacity: 1; }
    </style>
</head>
<body>

    <div class="stage">
        <div class="corner top-left">
            <img src="orange-paper.png" class="paper-img" alt="Orange Paper">
        </div>

        <div class="corner top-right">
            <img src="blue-paper.png" class="paper-img" alt="Blue Paper">
        </div>

        <div class="corner bottom-left">
            <img src="green-paper.png" class="paper-img" alt="Green Paper">
        </div>

        <div class="corner bottom-right">
            <img src="purple-paper.png" class="paper-img" alt="Purple Paper">
        </div>

        <div class="eye-container">
            <img src="eye-resting.png" class="eye-center eye-resting" alt="Alina Eye">
            <img src="eye-blinking.png" class="eye-center eye-blinking" alt="Alina Eye Blinking">
        </div>
    </div>

</body>
</html>
